name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/frontend-deploy.yml'
      - 'frontend/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/exeal-es/urlshortener-web

defaults:
  run:
    working-directory: frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          REACT_APP_AUTH0_DOMAIN: ${{ vars.REACT_APP_AUTH0_DOMAIN }}
          REACT_APP_AUTH0_CLIENT_ID: ${{ vars.REACT_APP_AUTH0_CLIENT_ID }}
          REACT_APP_AUTH0_AUDIENCE: ${{ vars.REACT_APP_AUTH0_AUDIENCE }}
          REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push image
        run: docker push $IMAGE_NAME:latest

      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_FRONTEND }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
